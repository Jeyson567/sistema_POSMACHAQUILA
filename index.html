<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Bar y Cocina</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:20px;
}
h1{text-align:center;}
.container{
    display:flex;
    gap:20px;
}
.inventory{
    background:#fff;
    padding:15px;
    border-radius:8px;
    width:50%;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
.inventory h2{text-align:center;}
input{
    width:100%;
    padding:6px;
    margin:4px 0;
}
button{
    width:100%;
    padding:7px;
    margin-top:4px;
    cursor:pointer;
}
.print-btn{
    background:#e0e0e0;
    font-weight:bold;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    border:1px solid #000;
    padding:5px;
    text-align:center;
}

/* ===== IMPRESIÓN ===== */
@media print {
    body{
        background:#fff;
        padding:0;
    }
    button, input{
        display:none;
    }
    .container{
        display:block;
    }
    .inventory{
        width:100%;
        box-shadow:none;
        margin:0;
    }
    .no-print{
        display:none;
    }
    table{
        page-break-inside:auto;
    }
    tr{
        page-break-inside:avoid;
    }
}
</style>
</head>

<body>

<h1>Control de Inventario</h1>

<div class="container">

<!-- BAR -->
<div class="inventory" id="barSection">
<h2>Bar</h2>

<div class="no-print">
<input id="barNombre" placeholder="Nombre del producto">
<input id="barCantidad" type="number" placeholder="Cantidad">

<button onclick="agregarProducto('bar')">Agregar nuevo</button>
<button onclick="sumarCantidad('bar')">Agregar cantidad</button>
<button onclick="venderProducto('bar')">Vender</button>
<button onclick="eliminarProducto('bar')">Eliminar producto</button>
<button class="print-btn" onclick="imprimirSeccion('barSection')">🖨 Imprimir Bar</button>
</div>

<table>
<thead><tr><th>Producto</th><th>Cantidad</th></tr></thead>
<tbody id="barTabla"></tbody>
</table>
</div>

<!-- COCINA -->
<div class="inventory" id="cocinaSection">
<h2>Cocina</h2>

<div class="no-print">
<input id="cocinaNombre" placeholder="Nombre del producto">
<input id="cocinaCantidad" type="number" placeholder="Cantidad">

<button onclick="agregarProducto('cocina')">Agregar nuevo</button>
<button onclick="sumarCantidad('cocina')">Agregar cantidad</button>
<button onclick="venderProducto('cocina')">Vender</button>
<button onclick="eliminarProducto('cocina')">Eliminar producto</button>
<button class="print-btn" onclick="imprimirSeccion('cocinaSection')">🖨 Imprimir Cocina</button>
</div>

<table>
<thead><tr><th>Producto</th><th>Cantidad</th></tr></thead>
<tbody id="cocinaTabla"></tbody>
</table>
</div>

</div>

<script>
function obtenerInventario(tipo){
    return JSON.parse(localStorage.getItem(tipo)) || {};
}
function guardarInventario(tipo,data){
    localStorage.setItem(tipo,JSON.stringify(data));
}
function confirmar(msg){
    return confirm(msg);
}
function actualizarTabla(tipo){
    const tabla=document.getElementById(tipo+'Tabla');
    const inv=obtenerInventario(tipo);
    tabla.innerHTML='';
    for(let p in inv){
        tabla.innerHTML+=`<tr><td>${p}</td><td>${inv[p]}</td></tr>`;
    }
}

function agregarProducto(tipo){
    const n=document.getElementById(tipo+'Nombre').value.trim();
    const c=parseInt(document.getElementById(tipo+'Cantidad').value);
    if(!n||c<0)return;
    if(!confirmar(`¿Agregar "${n}" con cantidad ${c}?`))return;
    const inv=obtenerInventario(tipo);
    if(inv[n]!==undefined)return;
    inv[n]=c;
    guardarInventario(tipo,inv);
    actualizarTabla(tipo);
}
function sumarCantidad(tipo){
    const n=document.getElementById(tipo+'Nombre').value.trim();
    const c=parseInt(document.getElementById(tipo+'Cantidad').value);
    if(!n||c<=0)return;
    if(!confirmar(`¿Sumar ${c} a "${n}"?`))return;
    const inv=obtenerInventario(tipo);
    if(inv[n]===undefined)return;
    inv[n]+=c;
    guardarInventario(tipo,inv);
    actualizarTabla(tipo);
}
function venderProducto(tipo){
    const n=document.getElementById(tipo+'Nombre').value.trim();
    const c=parseInt(document.getElementById(tipo+'Cantidad').value);
    if(!n||c<=0)return;
    if(!confirmar(`¿Vender ${c} de "${n}"?`))return;
    const inv=obtenerInventario(tipo);
    if(inv[n]===undefined)return;
    inv[n]-=c;
    if(inv[n]<0)inv[n]=0;
    guardarInventario(tipo,inv);
    actualizarTabla(tipo);
}
function eliminarProducto(tipo){
    const n=document.getElementById(tipo+'Nombre').value.trim();
    if(!n)return;
    if(!confirmar(`¿ELIMINAR COMPLETAMENTE "${n}"?`))return;
    const inv=obtenerInventario(tipo);
    delete inv[n];
    guardarInventario(tipo,inv);
    actualizarTabla(tipo);
}

/* ===== IMPRIMIR SOLO UNA SECCIÓN ===== */
function imprimirSeccion(id){
    const seccion=document.getElementById(id).innerHTML;
    const original=document.body.innerHTML;

    document.body.innerHTML = `
        <h1>Inventario</h1>
        <div>${seccion}</div>
    `;

    window.print();
    document.body.innerHTML = original;
    location.reload();
}

actualizarTabla('bar');
actualizarTabla('cocina');
</script>

</body>
</html>
